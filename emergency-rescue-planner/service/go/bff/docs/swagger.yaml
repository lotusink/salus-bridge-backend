  /api/knowledge/articles/{id}:
    get:
      description: Returns the full article including content (intro + sections).
        Returns 404 when id is not found.
      parameters:
      - description: Article id (matches ^[a-z0-9-]+$)
        example: bushfire-mobility-prep
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/knowledge_engine.Article'
