          description: invalid request
          schema:
            type: string
        "404":
          description: article not found
          schema:
            $ref: '#/definitions/knowledge_engine.ErrorResponse'
        "500":
          description: internal error
          schema:
            type: string
      summary: Fetch full article by id
      tags:
      - knowledge
  /api/knowledge/languages:
    get:
      description: Returns the hardcoded list of BCP-47 language codes and their English
        display names that are accepted by POST /api/knowledge/translate.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/translation_engine.LanguageOption'
            type: array
      summary: List supported translation target languages
      tags:
      - knowledge
  /api/knowledge/search:
    get:
      description: Returns a paginated list of article summaries plus aggregated facets
        derived from the full filtered set.
      parameters:
      - description: Case-insensitive search over title/content
        example: evacuation
        in: query
        name: q
        type: string
      - description: Disaster phase filter
        enum:
        - pre
        - during
        - post
        example: pre
        in: query
        name: phase
        type: string
      - collectionFormat: multi
        description: 'Filter: any-of disability types'
        example: mobility,hearing
        in: query
        items:
          type: string
        name: disability_types
        type: array
      - collectionFormat: multi
        description: 'Filter: any-of hazards'
        example: bushfire,flood
        in: query
        items:
          type: string
        name: hazards
        type: array
      - description: Page size (default 20, max 100)
        example: 20
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        example: 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/knowledge_engine.SearchResponse'
        "400":
          description: invalid request
          schema:
            type: string
        "500":
          description: search failed
          schema:
            type: string
      summary: List knowledge articles by keyword and filters
      tags:
      - knowledge
  /api/knowledge/transcribe:
    post:
      consumes:
      - multipart/form-data
      description: Accepts a multipart/form-data upload with an "audio" file field
        and optional "model"/"language" fields. Returns transcribed text and the BCP-47
        detected language code.
      parameters:
      - description: Audio file (mp3, mp4, mpeg, mpga, m4a, wav, webm)
        in: formData
        name: audio
        required: true
        type: file
      - description: 'Whisper model (default: whisper-1)'
        example: whisper-1
        in: formData
        name: model
        type: string
      - description: Input language hint (BCP-47)
        example: en
        in: formData
        name: language
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/translation_engine.TranscribeResponse'
        "400":
          description: invalid request
          schema:
            type: string
        "502":
          description: upstream error
          schema:
            type: string
      summary: Transcribe audio to text via Whisper
      tags:
      - knowledge
